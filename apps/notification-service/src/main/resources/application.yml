server:
  # 로컬 개발용 포트
  port: 8092

spring:
  application:
    name: notification-service

  # 채널 설정·발송 이력 저장 — PostgreSQL (2026-07-22 H2에서 전환, NFR-5: 시크릿은 환경변수)
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/notification}
    username: ${NOTIFICATION_DB_USER:notification}
    password: ${NOTIFICATION_DB_PASSWORD:notification-local}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9192}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      # 신뢰성 소비: 자동 커밋을 끄고 리스너 컨테이너가 관리 (NFR-4 메시지 유실 방지)
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      # DLT 발행용 (실패 메시지 격리)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    listener:
      ack-mode: record

# 알림 이벤트 토픽
notification:
  topic: notification
  dlt-suffix: .DLT
  # 외부 발송 API는 WireMock으로 모사합니다. 시크릿은 환경변수로만 받습니다.
  send:
    base-url: ${NOTIFICATION_SEND_URL:http://localhost:8110}
    api-key: ${NOTIFICATION_SEND_API_KEY:local-mock-key}
  # 수신자 조회 API도 WireMock으로 모사합니다 (UC-2)
  recipient:
    base-url: ${NOTIFICATION_RECIPIENT_URL:http://localhost:8110}
  # 발송 이력 (UC-3 조회 · UC-5 아카이빙)
  history:
    # 매일 03:00에 전일 이력을 파일로 내보냅니다 (UC-5)
    archive-cron: ${NOTIFICATION_HISTORY_ARCHIVE_CRON:0 0 3 * * *}
    archive-dir: ${NOTIFICATION_HISTORY_ARCHIVE_DIR:./archive}

# 회로차단기 (Resilience4j) — 발송 반복 실패 시 차단
resilience4j:
  circuitbreaker:
    instances:
      notificationSend:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2

# Caffeine 채널 설정 캐시 (조회 부하 감소)
# spring.cache.type=caffeine 자동 감지, 스펙은 CacheConfig에서 코드로 정의

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers

logging:
  level:
    com.practice.notification: DEBUG
